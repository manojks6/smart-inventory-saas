<h2 mat-dialog-title class="m-0 fw-bold border-bottom pb-3">
  <div class="d-flex align-items-center">
    <mat-icon color="primary" class="me-2">inventory_2</mat-icon>
    {{ isEdit ? 'Edit Product' : 'Add New Product' }}
  </div>
</h2>

<mat-dialog-content class="pt-4" style="overflow: visible;">
  <form [formGroup]="productForm" class="dialog-form">
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Product Name</mat-label>
      <input matInput formControlName="name" placeholder="Wireless Mouse">
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>SKU / Barcode</mat-label>
      <input matInput formControlName="sku" placeholder="PROD-123-ABC">
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Price</mat-label>
      <input matInput type="number" formControlName="price" placeholder="0.00">
      <span matPrefix class="me-2">$</span>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" placeholder="Optional product details..." rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="border-top pt-3">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="productForm.invalid" class="ms-2">
    {{ isEdit ? 'Save Changes' : 'Create Product' }}
  </button>
</mat-dialog-actions>
