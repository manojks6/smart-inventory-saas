<div class="p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h2 mb-1">Inventory & Warehousing</h1>
      <p class="text-secondary">Manage storage locations and stock distribution</p>
    </div>
    <button mat-flat-button color="primary" (click)="addWarehouse()">
      <mat-icon class="me-2">add_location</mat-icon>
      Add Warehouse
    </button>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-md-4" *ngFor="let wh of warehouses()">
      <mat-card class="border rounded-4 mat-elevation-z0 p-3">
        <div class="d-flex justify-content-between align-items-start">
          <div class="bg-primary-subtle text-primary rounded-3 d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
            <mat-icon>warehouse</mat-icon>
          </div>
          <button mat-icon-button color="primary">
            <mat-icon>more_vert</mat-icon>
          </button>
        </div>
        <div class="mt-3">
          <h3 class="h5 fw-bold mb-1">{{wh.name}}</h3>
          <p class="text-secondary small mb-3">
            <mat-icon style="font-size: 14px; width: 14px; height: 14px; vertical-align: middle;">place</mat-icon>
            {{wh.location}}
          </p>
          <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
            <span class="text-secondary small">Status</span>
            <span class="badge bg-success-subtle text-success rounded-pill">Active</span>
          </div>
        </div>
      </mat-card>
    </div>

    <div *ngIf="warehouses().length === 0" class="col-12">
      <mat-card class="border rounded-4 mat-elevation-z0 p-5 text-center bg-light">
        <mat-icon style="font-size: 3rem; width: 3rem; height: 3rem;" class="text-secondary opacity-25">warehouse</mat-icon>
        <p class="mt-3 text-secondary">No warehouses registered yet.</p>
        <button mat-stroked-button color="primary" class="mt-2" (click)="addWarehouse()">Create your first location</button>
      </mat-card>
    </div>
  </div>
</div>
